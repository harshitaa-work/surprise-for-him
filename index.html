<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Don't Click 👀</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="page active" id="page1">
    <h1>Hi 👀</h1>
    <p>Please click me</p>
    <button onclick="startExperience()">Pretty pleaseeeee 🥺👉👈</button>
  </div>
  <div class="page" id="page2">
    <p id="typingText"></p>
  </div>
  <div class="page" id="page3">
    <h1>⚠️ ERROR ⚠️</h1>
    <p>System hacked 💀</p>
    <button onclick="nextPage(4)">Try again?</button>
  </div>
  <div class="page" id="page4">
    <h1>Surprise ✈️</h1>
    <p>My prince deserves everything… 👑</p>
    <p>(And yes, today I’m talking about Adu 😌)</p>
  </div>
</div>
<script>
function nextPage(pageNumber) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('page' + pageNumber).style.display = 'block';
}
function startExperience() {
  nextPage(2);
  typeText();
}
const text = `Okay now you’re officially in my trap 💀🔥
Something very illegal is about to happen…
Relax… not *that* illegal 😌
Okay fine… I was a *little* scared too 🥲
But then I thought…
some risks are worth taking 😏
So I did something…`;
let i = 0;
function typeText() {
  const el = document.getElementById("typingText");
  if (i < text.length) {
    el.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 40);
  } else {
    setTimeout(() => nextPage(3), 1500);
  }
}
</script>
</body>
</htm
